<!DOCTYPE html>
<html>
  <head>
    {% include head.html %}
  </head>

<body>

  {% include nav.html %}

  <article class="post"
  data-article-id="{{ page.url | remove: '/' | escape }}"
  data-article-name="{{ page.title | escape }}"
  data-article-category="blog"
  data-article-author="{{ page.author | default: site.name | escape }}"
  data-article-publish-date="{{ page.date | date: '%Y-%m-%d' }}"
  data-article-description="{% if page.description %}{{ page.description | escape }}{% else %}{{ page.content | strip_html | strip_newlines | strip | truncate: 200 | escape }}{% endif %}"
  data-article-tags="{{ page.tags | join: ',' | escape }}">

<div class="space-extra-small"></div>

  <div class="wrapper">
    <div class="header header-filter" style="background-image: url('{{ site.baseurl }}/assets/img/bg3.jpeg');">
  		<div class="container">
  			<div class="row">
  				<div class="col-md-6 col-md-offset-3">
  					<h1 class="title text-center"></h1>

            {% include search.html %}
  				</div>
  			</div>
  		</div>
  	</div>

    <div class="main main-raised">
        <div class="section">
  		      <div class="container">
                  <h1 class="title text-center">
                    {{page.title}}
                  </h1>

                  <span class="meta">
                     Criado em: {{ page.date | date: "%d/%m/%Y" }}
                  </span>

                  <br />
                  <br />

  			         {{ content }}
  		      </div>
  	   </div>
    </div>

    {% include footer.html %}
  </div>

  {% include analytics.html %}

  {% include javascript.html %}
</body>
</html>
