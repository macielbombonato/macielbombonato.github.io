<!DOCTYPE html>
<html>
  <head>
    {% include head.html %}
  </head>

  <!-- data-no-turbolink: force full page loads on every navigation. The
       bundled turbolinks-classic (assets/js/application.js) otherwise swaps
       the <body> in place on link clicks, which (a) never re-runs the
       <head> MCP renderer/beacon and (b) races the MCP sitemap isMatch,
       leaving #mcp-related-* empty until a manual refresh. A full load is
       the known-good path. -->
  <body data-no-turbolink>

  <!-- Navbar will come here -->
  {% include nav.html %}
  <!-- end navbar -->

  <div class="wrapper">
    <div class="header header-filter" style="background-image: url('{{ site.baseurl }}/assets/img/bg3.jpeg');">
  		<div class="container">
  			<div class="row">
  				<div class="col-md-6 col-md-offset-3">
  					<h1 class="title text-center"></h1>

            {% include search.html %}
  				</div>
  			</div>
  		</div>
  	</div>

    <div class="main main-raised">
        <div class="section">
  		      <div class="container">
  			         {{ content }}
  		      </div>
  	   </div>
    </div>

    {% include footer.html %}
  </div>

  {% include javascript.html %}
  </body>
</html>
